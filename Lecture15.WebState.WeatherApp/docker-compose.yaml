services:
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass devpassword
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - redis

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - redis

networks:
  redis:
    driver: bridge
